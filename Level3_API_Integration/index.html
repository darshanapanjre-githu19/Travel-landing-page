<!DOCTYPE html>
<html>

<body>

<h2>Travel Blog Posts</h2>

<div id="data"></div>

<script>

fetch("https://jsonplaceholder.typicode.com/posts?_limit=3")

.then(res => res.json())

.then(data => {

data.forEach(post => {

document.getElementById("data").innerHTML +=
"<h3>"+post.title+"</h3><p>"+post.body+"</p>"

})

})

</script>

</body>
</html>
